<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panneau de Contrôle - Super-Bot Radio</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-bg: #16213e;
            --accent-color: #0f3460;
            --text-color: #e94560;
            --text-light: #ffffff;
            --success-color: #4cd137;
            --danger-color: #e84118;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: var(--text-color);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--danger-color);
            box-shadow: 0 0 10px var(--danger-color);
        }

        .dot.online {
            background-color: var(--success-color);
            box-shadow: 0 0 10px var(--success-color);
        }

        .info-panel {
            margin-bottom: 25px;
        }

        .info-item {
            margin: 10px 0;
            font-size: 1.1em;
        }

        .info-item span {
            color: var(--text-color);
            font-weight: bold;
        }

        .control-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: var(--accent-color);
            color: white;
            font-size: 1em;
            box-sizing: border-box;
        }

        input[type="text"]::placeholder {
            color: #bbb;
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-inject {
            background-color: var(--text-color);
            color: white;
        }

        .btn-inject:hover {
            background-color: #ff5773;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.4);
        }

        .btn-skip {
            background-color: #6c757d;
            color: white;
        }

        .btn-skip:hover {
            background-color: #5a6268;
        }

        .log-box {
            margin-top: 25px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            max-height: 150px;
            overflow-y: auto;
            border-left: 4px solid var(--text-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎵 Super-Bot Radio</h1>

        <div class="status-bar">
            <div class="status-indicator">
                <div id="statusDot" class="dot"></div>
                <span id="statusText">DÉCONNECTÉ</span>
            </div>
            <div>API: <span id="apiUrl">mybotsradio.onrender.com</span></div>
        </div>

        <div class="info-panel">
            <div class="info-item">📻 Lecture actuelle : <span id="currentSong">Aucune</span></div>
            <div class="info-item">⏭️ Prochaine musique : <span id="nextSong">Aucune</span></div>
        </div>

        <div class="control-section">
            <input type="text" id="musicUrl" placeholder="Collez un lien YouTube, Spotify ou Deezer (Titre, Album, Playlist)...">
            
            <div class="btn-group">
                <button class="btn-inject" onclick="injectMusic()">🚀 Injecter dans la Radio</button>
                <button class="btn-skip" onclick="skipMusic()">⏭️ Passer</button>
            </div>
        </div>

        <div class="log-box" id="logBox">
            [Système] Prêt. Connectez le bot sur Discord avec la commande !music play pour commencer.
        </div>
    </div>

    <script>
        // CONFIGURATION DU LIEN RENDER DE TON BOT
        const BASE_URL = "https://mybotsradio.onrender.com";

        function addLog(text) {
            const logBox = document.getElementById('logBox');
            logBox.innerHTML += `<br>[${new Date().toLocaleTimeString()}] ${text}`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        async function checkStatus() {
            try {
                const response = await fetch(`${BASE_URL}/status`);
                if (!response.ok) throw new Error();
                const data = await response.json();

                document.getElementById('statusDot').className = "dot online";
                document.getElementById('statusText').innerText = "EN LIGNE";
                document.getElementById('currentSong').innerText = data.currentSong || "Aucune";
                document.getElementById('nextSong').innerText = data.nextSong || "Aucune";
            } catch (err) {
                document.getElementById('statusDot').className = "dot";
                document.getElementById('statusText').innerText = "DÉCONNECTÉ";
                document.getElementById('currentSong').innerText = "Aucune (Bot éteint)";
                document.getElementById('nextSong').innerText = "Aucune";
            }
        }

        async function injectMusic() {
            const urlInput = document.getElementById('musicUrl');
            const url = urlInput.value.trim();

            if (!url) {
                alert("Veuillez entrer un lien valide !");
                return;
            }

            addLog("Envoi de la demande d'injection...");
            
            try {
                const response = await fetch(`${BASE_URL}/api/play`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();
                if (response.ok) {
                    addLog(data.message);
                    urlInput.value = "";
                } else {
                    addLog(`❌ Erreur : ${data.error}`);
                    alert(data.error);
                }
            } catch (err) {
                addLog("❌ Impossible de joindre le bot Render. Vérifiez qu'il est bien allumé.");
            }
            checkStatus();
        }

        async function skipMusic() {
            addLog("Demande de passage à la musique suivante...");
            try {
                const response = await fetch(`${BASE_URL}/api/skip`, { method: 'POST' });
                if (response.ok) {
                    addLog("⏭️ Commande Skip envoyée au bot !");
                }
            } catch (err) {
                addLog("❌ Erreur lors de la demande de Skip.");
            }
            setTimeout(checkStatus, 1000);
        }

        // Vérification automatique toutes les 5 secondes
        setInterval(checkStatus, 5000);
        checkStatus();
    </script>
</body>
</html>
